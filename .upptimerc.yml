# 1227 OpenCloud Upptime Configuration
owner: 12si27
repo: 1227-uptime

sites:
  - name: 1227 OpenCloud Main Server
    url: https://cloud.1227.kr/ping/
    link: https://cloud.1227.kr
  - name: 1227 OpenCloud Sub Server
    url: https://cloud-stream-sub.1227.kr/ping
    link: https://cloud.1227.kr
  - name: 1227 Encoder
    url: https://encoder.1227.kr

status-website:
  cname: status.1227.kr
  logoUrl: https://cloud.1227.kr/img.png
  name: 1227 OpenCloud # 브라우저 탭 타이틀로 사용
  theme: dark # 다크 테마 기본 활성화

  # 커스텀 HTML 타이틀 삽입
  introMessage: |
    <div class="cloud-title" style="text-align: center; margin-top: 2rem; margin-bottom: 1rem;">
      <span style="font-weight: 900; font-size: 3rem;">12:<span style="color:#5aa1ef">27</span></span><br>
      <span style="font-weight: 600; font-size: 1.8rem;">OpenCloud</span>
    </div>
    <p style="text-align: center; color: #a0aec0; margin-bottom: 3rem; font-size: 1.1rem;">
      1227 OpenCloud 서비스 및 엔드포인트의 실시간 상태 모니터링 페이지입니다.
    </p>

  # 강제 다크 테마 및 커스텀 색상 적용
  customStyles: |
    /* 전체 배경 강제 적용 */
    body, html, main {
      background-color: #161C23 !important;
      color: #ffffff !important;
    }
    /* Tailwind 배경색 유틸리티 덮어쓰기 */
    [class*="bg-gray-900"], [class*="bg-gray-50"] {
      background-color: #161C23 !important;
    }
    /* Upptime 카드 (컨테이너) 배경색 덮어쓰기 */
    [class*="bg-gray-800"], [class*="bg-white"] {
      background-color: #1e2630 !important;
    }
    /* 텍스트 색상 보정 */
    [class*="text-gray-900"], [class*="text-gray-800"], .text-gray-900 {
      color: #ffffff !important;
    }
    [class*="text-gray-500"], [class*="text-gray-600"] {
      color: #a0aec0 !important;
    }
    /* 테두리 색상 보정 */
    [class*="border-gray-"] {
      border-color: #2d3748 !important;
    }
    /* 네비게이션 바 색상 지정 */
    nav, header {
      background-color: #161C23 !important;
      border-bottom: 1px solid #2d3748 !important;
    }

  navbar:
    - title: Status
      href: /
    - title: OpenCloud Home
      href: https://cloud.1227.kr
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
